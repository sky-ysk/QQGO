version: "3.8"

services:
  server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_PATH=/data/qqgo.db
      - MAX_CONNECTIONS=10000
      - MSG_RATE_LIMIT=10
      # - TLS_CERT=/app/certs/server.crt
      # - TLS_KEY=/app/certs/server.key
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

