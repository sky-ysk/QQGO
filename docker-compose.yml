services:
  server:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - DB_PATH=/data/qqgo.db
      - MAX_CONNECTIONS=10000
      - MSG_RATE_LIMIT=10
      - REDIS_ENABLED=true
      - REDIS_ADDR=redis:6379
      # - TLS_CERT=/app/certs/server.crt
      # - TLS_KEY=/app/certs/server.key
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped

volumes:
  redis_data:
